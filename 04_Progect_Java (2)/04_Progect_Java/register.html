<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinQuantDash - 用户注册</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="register.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="background">
        <div class="grid-container"></div>
        <canvas id="particles"></canvas>
    </div>
    
    <div class="register-container">
        <div class="left-section">
            <div class="brand">
                <h1>FinQuantDash</h1>
                <p class="brand-subtitle">全栈量化选股系统 | 专业量化决策平台</p>
            </div>
            
            <div class="brand-motto">
                <p>以数据驱动决策，用算法捕捉市场机会，为专业投资者打造高效、严谨的量化投研工具</p>
            </div>
            
            <div class="kline-illustration">
                <svg viewBox="0 0 200 100" class="kline-svg">
                    <defs>
                        <linearGradient id="klineGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.3" />
                            <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0.8" />
                        </linearGradient>
                    </defs>
                    <path d="M10,80 Q30,60 50,70 T90,50 T130,65 T170,40 T190,55" 
                          fill="none" stroke="url(#klineGradient)" stroke-width="1.5" stroke-linecap="round"/>
                    <circle cx="10" cy="80" r="2" fill="#00d4ff" opacity="0.8"/>
                    <circle cx="50" cy="70" r="2" fill="#00d4ff" opacity="0.8"/>
                    <circle cx="90" cy="50" r="2" fill="#00d4ff" opacity="0.8"/>
                    <circle cx="130" cy="65" r="2" fill="#00d4ff" opacity="0.8"/>
                    <circle cx="170" cy="40" r="2" fill="#00d4ff" opacity="0.8"/>
                    <circle cx="190" cy="55" r="2" fill="#00d4ff" opacity="0.8"/>
                </svg>
            </div>
            
            <p class="copyright">© 2026 FinQuantDash All Rights Reserved</p>
        </div>
        
        <div class="right-section">
            <div class="register-card">
                <div class="register-header">
                    <h2>用户注册</h2>
                    <p>创建您的量化决策平台账号</p>
                    <div class="divider"></div>
                </div>
                
                <form class="register-form" id="registerForm">
                    <div class="form-group">
                        <label for="username">用户名</label>
                        <div class="input-wrapper">
                            <input type="text" id="username" placeholder="请输入用户名" required>
                            <i class="fa-regular fa-user" id="userIcon"></i>
                        </div>
                        <span class="error-message" id="usernameError"></span>
                    </div>
                    
                    <div class="form-group">
                        <label for="phone">手机号码</label>
                        <div class="input-wrapper">
                            <input type="tel" id="phone" placeholder="请输入手机号码" required>
                            <i class="fa-solid fa-phone" id="phoneIcon"></i>
                        </div>
                        <span class="error-message" id="phoneError"></span>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">登录密码</label>
                        <div class="input-wrapper">
                            <input type="password" id="password" placeholder="请输入登录密码" required>
                            <i class="fa-regular fa-eye" id="passwordToggle"></i>
                        </div>
                        <span class="error-message" id="passwordError"></span>
                        <span class="password-hint">密码需包含字母、数字，长度6-20位</span>
                    </div>
                    
                    <div class="form-group">
                        <label for="confirmPassword">确认密码</label>
                        <div class="input-wrapper">
                            <input type="password" id="confirmPassword" placeholder="请再次输入密码" required>
                            <i class="fa-regular fa-eye" id="confirmPasswordToggle"></i>
                        </div>
                        <span class="error-message" id="confirmPasswordError"></span>
                    </div>
                    
                    <div class="form-group">
                        <label for="smsCode">短信验证码</label>
                        <div class="input-wrapper">
                            <input type="text" id="smsCode" placeholder="请输入验证码" required>
                            <button type="button" class="sms-btn" id="sendSmsBtn">发送验证码</button>
                        </div>
                        <span class="error-message" id="smsCodeError"></span>
                    </div>
                    
                    <div class="form-options">
                        <label class="checkbox-label">
                            <input type="checkbox" id="agreeTerms" required>
                            <span class="checkmark"></span>
                            <span>我已阅读并同意<a href="#" class="terms-link">《用户协议》</a>和<a href="#" class="terms-link">《隐私政策》</a></span>
                        </label>
                    </div>
                    
                    <button type="submit" class="register-btn">注册</button>
                </form>
                
                <p class="login-link">
                    已有账号？<a href="index.html">立即登录</a>
                </p>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
    <script src="register.js"></script>
</body>
</html>
